# Training-specific overrides
training:
  batch_size: 256
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
  device: "cpu"
  use_class_weights: true
  scheduler_patience: 5
  scheduler_factor: 0.5
  num_workers: 4
  checkpoint_dir: "checkpoints"
  metrics_log: "checkpoints/metrics.jsonl"
  save_every_n_epochs: 5
