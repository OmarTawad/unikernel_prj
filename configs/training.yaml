# Training-specific overrides — tuned for 12 vCPU, 22 GiB RAM, CPU-only
#
# batch_size: 4096 — 4096 × 80 × 4 bytes = 1.3 MB per batch.
#   Large enough for efficient vectorized computation on CPU,
#   small enough to leave RAM headroom for workers + OS.
#   With 32.6M training rows = ~7,960 steps/epoch.
#
# num_workers: 6 — half of 12 vCPU. Leaves 6 cores for the main process,
#   OS, and any monitoring. Workers read from memmap so I/O is cheap.
#
# log_every_n_steps: 200 — ~40 log lines per epoch for visibility
#   without flooding. Shows loss, lr, step/s, and ETA.
#
# save_every_n_epochs: 10 — 5 periodic checkpoints across 50 epochs.
#   Each checkpoint ≈ 100 KB (19K params). Disk impact negligible.

training:
  batch_size: 4096
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
  device: "cpu"
  use_class_weights: true
  scheduler_patience: 5
  scheduler_factor: 0.5
  num_workers: 6
  checkpoint_dir: "checkpoints"
  metrics_log: "checkpoints/metrics.jsonl"
  save_every_n_epochs: 10
  log_every_n_steps: 200
